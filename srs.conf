# SRS 6.0 Configuration for HomeGuard-RTC (Phase 3 Adaptation)

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    https {
        enabled     on;
        listen      8443;
        key         ./conf/certs/local.test-key.pem;
        cert        ./conf/certs/local.test.pem;
    }
}

stats {
    network         0;
}

stream_caster {
    enabled         off;
}

vhost __defaultVhost__ {
    http_hooks {
        enabled         on;
        on_publish      http://192.168.1.9:3000/internal/srs/on-publish;
        on_unpublish    http://192.168.1.9:3000/internal/srs/on-stop;
        on_play         http://192.168.1.9:3000/internal/srs/on-play;
        on_stop         http://192.168.1.9:3000/internal/srs/on-stop;
    }

    rtc {
        enabled     on;
        bframe      discard;
        rtc_to_rtmp on;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    hls {
        enabled     on;
        hls_path    ./objs/nginx/html;
        hls_fragment 5;
        hls_window  30;
    }

    dvr {
        enabled     on;
        dvr_path    ./objs/nginx/html/objs/dvr/[app]/[stream]/[2006]/[01]/[02]/[15].[04].[05].[999].mp4;
        dvr_plan    session;
    }
}

rtc_server {
    enabled         on;
    listen          8000;
    protocol        both;
    candidate       192.168.1.9;
    
    tcp {
        enabled     on;
        listen      8444;
    }
}
