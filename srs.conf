# SRS 6.0 Configuration for HomeGuard-RTC (Phase 3 Adaptation)

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    https {
        enabled     on;
        listen      8443;
        key         ./conf/certs/local.test-key.pem;
        cert        ./conf/certs/local.test.pem;
    }
}

stats {
    network         0;
}

stream_caster {
    enabled         off;
}

vhost __defaultVhost__ {
    http_hooks {
        enabled         on;
        on_publish      http://host.docker.internal:3000/internal/srs/on-publish;
        on_unpublish    http://host.docker.internal:3000/internal/srs/on-stop;
        on_play         http://host.docker.internal:3000/internal/srs/on-play;
        on_stop         http://host.docker.internal:3000/internal/srs/on-stop;
    }

    rtc {
        enabled     on;
        bframe      discard;
    }
}

rtc_server {
    enabled         on;
    listen          8000;
    protocol        both;
    candidate       media.local.test;
    
    tcp {
        enabled     on;
        listen      8444;
    }
}
